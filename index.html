<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0b0f14" />
    <title>Gamba Plinko</title>
    <style>
:root {
  --bg: #0b0f14;
  --surface: #121821;
  --card: #171f2b;
  --border: #253041;
  --text: #ffffff;
  --muted: #94a3b8;
  --green: #22c55e;
  --emerald: #10b981;
  --yellow: #f59e0b;
  --orange: #fb923c;
  --red: #ef4444;
  --cyan: #06b6d4;
  --blue: #3b82f6;
  --shadow: 0 24px 80px rgba(0, 0, 0, 0.42);
}

* {
  box-sizing: border-box;
}

html,
body {
  width: 100%;
  height: 100%;
  overflow: hidden;
}

body {
  margin: 0;
  background:
    radial-gradient(circle at 50% -10%, rgba(6, 182, 212, 0.15), transparent 36%),
    radial-gradient(circle at 10% 35%, rgba(34, 197, 94, 0.08), transparent 28%),
    var(--bg);
  color: var(--text);
  font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

button,
input {
  font: inherit;
}

button {
  border: 0;
  cursor: pointer;
}

button:disabled {
  cursor: not-allowed;
  opacity: 0.55;
}

.app {
  display: flex;
  height: 100vh;
  min-height: 0;
  flex-direction: column;
  gap: 14px;
  padding: 14px;
}

.topbar,
.board-panel,
.recent-panel,
.controls,
.control-card,
.risk-card,
.launch-card,
.stats-dialog {
  border: 1px solid rgba(37, 48, 65, 0.84);
  background:
    linear-gradient(180deg, rgba(255, 255, 255, 0.065), rgba(255, 255, 255, 0.025)),
    rgba(18, 24, 33, 0.82);
  box-shadow: var(--shadow);
  backdrop-filter: blur(18px);
}

.topbar {
  display: flex;
  min-height: 66px;
  align-items: center;
  justify-content: space-between;
  gap: 14px;
  border-radius: 16px;
  padding: 12px 16px;
}

.brand {
  display: flex;
  min-width: 0;
  align-items: center;
  gap: 12px;
}

.brand-mark {
  display: grid;
  width: 46px;
  height: 46px;
  place-items: center;
  border-radius: 14px;
  background: linear-gradient(135deg, var(--emerald), var(--cyan));
  color: #04110a;
  font-weight: 1000;
  box-shadow: 0 0 32px rgba(16, 185, 129, 0.35);
}

h1,
h2,
p {
  margin: 0;
}

.brand h1 {
  font-size: 1.08rem;
  line-height: 1.1;
}

.brand p,
.label,
.muted,
.hint {
  color: var(--muted);
}

.brand p {
  margin-top: 3px;
  font-size: 0.74rem;
  font-weight: 800;
  letter-spacing: 0.22em;
  text-transform: uppercase;
}

.top-actions {
  display: flex;
  align-items: center;
  gap: 10px;
}

.icon-btn,
.secondary-btn,
.input-row button,
.quick-row button,
.dialog-head button {
  min-height: 42px;
  border: 1px solid var(--border);
  border-radius: 12px;
  background: rgba(255, 255, 255, 0.055);
  color: var(--text);
  font-weight: 900;
  transition: transform 160ms ease, border-color 160ms ease, background 160ms ease;
}

.icon-btn {
  padding: 0 14px;
}

.icon-btn:hover,
.secondary-btn:hover,
.input-row button:hover,
.quick-row button:hover,
.dialog-head button:hover {
  transform: translateY(-1px);
  border-color: var(--cyan);
  background: rgba(255, 255, 255, 0.09);
}

.balance-card {
  min-width: 172px;
  border: 1px solid var(--border);
  border-radius: 14px;
  background: rgba(255, 255, 255, 0.045);
  padding: 9px 13px;
  text-align: right;
}

.balance-card span,
.board-stats span,
.control-card label,
.panel-title h2 {
  display: block;
  color: var(--muted);
  font-size: 0.68rem;
  font-weight: 1000;
  letter-spacing: 0.18em;
  text-transform: uppercase;
}

.balance-card strong,
.board-stats strong {
  display: block;
  margin-top: 2px;
  font-size: 0.92rem;
}

.layout {
  display: grid;
  min-height: 0;
  overflow: hidden;
  flex: 1;
  grid-template-columns: minmax(0, 1fr) 260px;
  gap: 14px;
}

.board-panel,
.recent-panel {
  min-height: 0;
  border-radius: 18px;
}

.board-panel {
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.board-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 14px 18px 4px;
}

.active-risks {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 7px;
}

.risk-pill {
  border: 1px solid currentColor;
  border-radius: 999px;
  padding: 5px 10px;
  font-size: 0.72rem;
  font-weight: 1000;
  text-transform: uppercase;
  box-shadow: 0 0 18px currentColor;
}

.board-stats {
  display: grid;
  min-width: min(420px, 48%);
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 10px;
}

.board-stats div {
  border: 1px solid var(--border);
  border-radius: 12px;
  background: rgba(0, 0, 0, 0.18);
  padding: 9px 12px;
  text-align: right;
}

.canvas-wrap {
  position: relative;
  min-height: 460px;
  flex: 1;
  overflow: hidden;
}

#boardCanvas {
  display: block;
  width: 100%;
  height: 100%;
}

.multiplier-grid {
  position: absolute;
  left: 0;
  bottom: 14px;
  display: grid;
  gap: 3px;
  pointer-events: none;
}

.multiplier-row {
  display: grid;
  grid-template-columns: repeat(15, minmax(0, 1fr));
  gap: 3px;
}

.multiplier-cell {
  display: grid;
  min-width: 0;
  height: 28px;
  place-items: center;
  border: 1px solid rgba(255, 255, 255, 0.16);
  border-radius: 6px;
  color: #fff;
  font-size: 0.68rem;
  font-weight: 1000;
  text-shadow: 0 1px 3px rgba(0, 0, 0, 0.95), 0 0 8px rgba(0, 0, 0, 0.85);
  transition: transform 180ms ease, box-shadow 180ms ease, border-color 180ms ease;
}

.multiplier-cell.dim {
  opacity: 0.3;
}

.multiplier-cell.hit {
  transform: scale(1.07);
  border-color: rgba(255, 255, 255, 0.9);
  box-shadow: 0 0 18px rgba(255, 255, 255, 0.22), 0 0 16px currentColor;
}
