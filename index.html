<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0b0f14" />
    <title>Gamba Plinko</title>
    <style>
:root {
  --bg: #0b0f14;
  --surface: #121821;
  --card: #171f2b;
  --border: #253041;
  --text: #ffffff;
  --muted: #94a3b8;
  --green: #22c55e;
  --emerald: #10b981;
  --yellow: #f59e0b;
  --orange: #fb923c;
  --red: #ef4444;
  --cyan: #06b6d4;
  --blue: #3b82f6;
  --shadow: 0 24px 80px rgba(0, 0, 0, 0.42);
}

* {
  box-sizing: border-box;
}

html,
body {
  width: 100%;
  height: 100%;
  overflow: hidden;
}

body {
  margin: 0;
  background:
    radial-gradient(circle at 50% -10%, rgba(6, 182, 212, 0.15), transparent 36%),
    radial-gradient(circle at 10% 35%, rgba(34, 197, 94, 0.08), transparent 28%),
    var(--bg);
  color: var(--text);
  font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

button,
input {
  font: inherit;
}

button {
  border: 0;
  cursor: pointer;
}

button:disabled {
  cursor: not-allowed;
  opacity: 0.55;
}

.app {
  display: flex;
  width: 100%;
  max-width: 1600px;
  height: 100vh;
  min-height: 0;
  flex-direction: column;
  gap: 16px;
  margin: 0 auto;
  padding: 16px;
}

.topbar,
.board-panel,
.recent-panel,
.controls,
.control-card,
.risk-card,
.launch-card,
.stats-dialog {
  border: 1px solid rgba(37, 48, 65, 0.84);
  background:
    linear-gradient(180deg, rgba(255, 255, 255, 0.065), rgba(255, 255, 255, 0.025)),
    rgba(18, 24, 33, 0.82);
  box-shadow: var(--shadow);
  backdrop-filter: blur(18px);
}

.topbar {
  display: flex;
  min-height: 66px;
  align-items: center;
  justify-content: space-between;
  gap: 14px;
  border-radius: 16px;
  padding: 12px 16px;
}

.brand {
  display: flex;
  min-width: 0;
  align-items: center;
  gap: 12px;
}

.brand-mark {
  display: grid;
  width: 46px;
  height: 46px;
  place-items: center;
  border-radius: 14px;
  background: linear-gradient(135deg, var(--emerald), var(--cyan));
  color: #04110a;
  font-weight: 1000;
  box-shadow: 0 0 32px rgba(16, 185, 129, 0.35);
}

h1,
h2,
p {
  margin: 0;
}

.brand h1 {
  font-size: 1.08rem;
  line-height: 1.1;
}

.brand p,
.label,
.muted,
.hint {
  color: var(--muted);
}

.brand p {
  margin-top: 3px;
  font-size: 0.74rem;
  font-weight: 800;
  letter-spacing: 0.22em;
  text-transform: uppercase;
}

.top-actions {
  display: flex;
  align-items: center;
  gap: 10px;
}

.icon-btn,
.secondary-btn,
.input-row button,
.quick-row button,
.dialog-head button {
  min-height: 42px;
  border: 1px solid var(--border);
  border-radius: 12px;
  background: rgba(255, 255, 255, 0.055);
  color: var(--text);
  font-weight: 900;
  transition: transform 160ms ease, border-color 160ms ease, background 160ms ease;
}

.icon-btn {
  padding: 0 14px;
}

.icon-btn:hover,
.secondary-btn:hover,
.input-row button:hover,
.quick-row button:hover,
.dialog-head button:hover {
  transform: translateY(-1px);
  border-color: var(--cyan);
  background: rgba(255, 255, 255, 0.09);
}

.balance-card {
  min-width: 172px;
  border: 1px solid var(--border);
  border-radius: 14px;
  background: rgba(255, 255, 255, 0.045);
  padding: 9px 13px;
  text-align: right;
}

.balance-card span,
.board-stats span,
.control-card label,
.panel-title h2 {
  display: block;
  color: var(--muted);
  font-size: 0.68rem;
  font-weight: 1000;
  letter-spacing: 0.18em;
  text-transform: uppercase;
}

.balance-card strong,
.board-stats strong {
  display: block;
  margin-top: 2px;
  font-size: 0.92rem;
}

.layout {
  display: grid;
  min-height: 0;
  overflow: hidden;
  flex: 1;
  grid-template-columns: minmax(0, 1fr) 300px;
  gap: 16px;
}

.board-panel,
.recent-panel {
  min-height: 0;
  border-radius: 18px;
}

.board-panel {
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.board-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 14px 20px 2px;
}

.active-risks {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 7px;
}

.risk-pill {
  border: 1px solid currentColor;
  border-radius: 999px;
  padding: 5px 10px;
  font-size: 0.72rem;
  font-weight: 1000;
  text-transform: uppercase;
  box-shadow: 0 0 18px currentColor;
}

.board-stats {
  display: grid;
  min-width: min(360px, 42%);
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 10px;
}

.board-stats div {
  border: 1px solid var(--border);
  border-radius: 12px;
  background: rgba(0, 0, 0, 0.18);
  padding: 9px 12px;
  text-align: right;
}

.canvas-wrap {
  position: relative;
  min-height: 520px;
  flex: 1;
  overflow: hidden;
}

#boardCanvas {
  display: block;
  width: 100%;
  height: 100%;
}

.multiplier-grid {
  position: absolute;
  left: 0;
  bottom: 12px;
  display: grid;
  gap: 4px;
  pointer-events: none;
}

.multiplier-row {
  display: grid;
  grid-template-columns: repeat(15, minmax(0, 1fr));
  gap: 4px;
}

.multiplier-cell {
  display: grid;
  min-width: 0;
  height: 34px;
  place-items: center;
  border: 1px solid rgba(255, 255, 255, 0.16);
  border-radius: 8px;
  color: #fff;
  font-size: 0.78rem;
  font-weight: 1000;
  text-shadow: 0 1px 3px rgba(0, 0, 0, 0.95), 0 0 8px rgba(0, 0, 0, 0.85);
  transition: transform 180ms ease, box-shadow 180ms ease, border-color 180ms ease;
}

.multiplier-cell.dim {
  opacity: 0.3;
}

.multiplier-cell.hit {
  transform: scale(1.07);
  border-color: rgba(255, 255, 255, 0.9);
  box-shadow: 0 0 18px rgba(255, 255, 255, 0.22), 0 0 16px currentColor;
}

.recent-panel {
  display: flex;
  min-height: 0;
  flex-direction: column;
  overflow: hidden;
  padding: 16px;
}

.panel-title {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  border-bottom: 1px solid var(--border);
  padding-bottom: 12px;
}

.panel-title span {
  border-radius: 999px;
  background: rgba(34, 197, 94, 0.16);
  color: var(--green);
  padding: 4px 9px;
  font-weight: 1000;
}

.recent-list {
  display: grid;
  min-height: 0;
  flex: 1;
  align-content: start;
  gap: 9px;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 12px 4px 0 0;
  scrollbar-width: thin;
  scrollbar-color: rgba(148, 163, 184, 0.48) rgba(255, 255, 255, 0.04);
}

.recent-list::-webkit-scrollbar {
  width: 8px;
}

.recent-list::-webkit-scrollbar-track {
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.04);
}

.recent-list::-webkit-scrollbar-thumb {
  border-radius: 999px;
  background: linear-gradient(180deg, rgba(6, 182, 212, 0.72), rgba(34, 197, 94, 0.5));
}

.recent-item {
  border: 1px solid var(--border);
  border-radius: 12px;
  background: rgba(255, 255, 255, 0.045);
  padding: 10px;
}

.recent-item strong {
  display: flex;
  justify-content: space-between;
  gap: 10px;
  font-size: 0.92rem;
}

.recent-item p {
  margin-top: 5px;
  color: var(--muted);
  font-size: 0.75rem;
  font-weight: 800;
  text-transform: uppercase;
}

.controls {
  display: grid;
  grid-template-columns: 1fr 0.72fr 1.55fr 0.76fr;
  gap: 12px;
  border-radius: 18px;
  padding: 12px;
}

.control-card,
.risk-card,
.launch-card {
  border-radius: 14px;
  padding: 12px;
  box-shadow: none;
}

.control-card label {
  margin-bottom: 9px;
}

.input-row {
  display: grid;
  grid-template-columns: 42px minmax(0, 1fr) 42px;
  gap: 8px;
}

.input-row input {
  min-width: 0;
  height: 42px;
  border: 1px solid var(--border);
  border-radius: 12px;
  background: #070b10;
  color: var(--text);
  font-weight: 1000;
  outline: 0;
  padding: 0 12px;
  text-align: center;
}

.input-row input:focus {
  border-color: var(--cyan);
  box-shadow: 0 0 0 3px rgba(6, 182, 212, 0.16);
}

.quick-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-top: 8px;
}

.hint {
  margin-top: 9px;
  font-size: 0.78rem;
  font-weight: 800;
}

.risk-card {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 10px;
}

.risk-btn {
  min-height: 72px;
  border: 1px solid var(--border);
  border-radius: 14px;
  background: rgba(255, 255, 255, 0.05);
  color: var(--text);
  opacity: 0.66;
  transition: transform 160ms ease, opacity 160ms ease, box-shadow 160ms ease, border-color 160ms ease, background 160ms ease;
}

.risk-btn:not(.active) {
  background: rgba(255, 255, 255, 0.045);
  filter: saturate(0.78);
}

.risk-btn span,
.risk-btn small {
  display: block;
  font-weight: 1000;
  text-transform: uppercase;
}

.risk-btn small {
  margin-top: 4px;
  color: rgba(255, 255, 255, 0.72);
  font-size: 0.68rem;
  letter-spacing: 0.14em;
}

.risk-btn.active {
  transform: translateY(-2px);
  opacity: 1;
}

.risk-btn.green.active {
  border-color: var(--green);
  background: linear-gradient(180deg, var(--green), rgba(23, 31, 43, 0.75));
  box-shadow: 0 0 32px rgba(34, 197, 94, 0.35);
}

.risk-btn.yellow.active {
  border-color: var(--yellow);
  background: linear-gradient(180deg, var(--yellow), rgba(23, 31, 43, 0.75));
  box-shadow: 0 0 32px rgba(245, 158, 11, 0.32);
}

.risk-btn.red.active {
  border-color: var(--red);
  background: linear-gradient(180deg, var(--red), rgba(23, 31, 43, 0.75));
  box-shadow: 0 0 32px rgba(239, 68, 68, 0.32);
}

.launch-card {
  display: grid;
  gap: 8px;
}

.drop-btn {
  min-height: 56px;
  border-radius: 14px;
  background: linear-gradient(135deg, var(--green), var(--cyan));
  color: #04110a;
  font-weight: 1000;
  text-transform: uppercase;
  box-shadow: 0 0 36px rgba(34, 197, 94, 0.36);
  transition: transform 160ms ease, filter 160ms ease;
}

.drop-btn:hover {
  transform: translateY(-1px);
  filter: brightness(1.06);
}

.secondary-btn {
  width: 100%;
}

.stats-dialog {
  width: min(720px, calc(100vw - 28px));
  border-radius: 18px;
  color: var(--text);
  padding: 18px;
}

.stats-dialog::backdrop {
  background: rgba(0, 0, 0, 0.72);
  backdrop-filter: blur(8px);
}

.dialog-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 14px;
}

.stats-grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 10px;
}

.stat-card {
  border: 1px solid var(--border);
  border-radius: 13px;
  background: rgba(255, 255, 255, 0.045);
  padding: 12px;
}

.stat-card span {
  color: var(--muted);
  font-size: 0.7rem;
  font-weight: 1000;
  letter-spacing: 0.16em;
  text-transform: uppercase;
}

.stat-card strong {
  display: block;
  margin-top: 6px;
  font-size: 1.08rem;
}

@media (max-width: 1080px) {
  html,
  body {
    height: auto;
    min-height: 100%;
    overflow: auto;
  }

  .app {
    height: auto;
    min-height: 100vh;
  }

  .layout {
    grid-template-columns: 1fr;
  }

  .recent-panel {
    display: none;
  }

  .controls {
    grid-template-columns: 1fr 1fr;
  }
}

@media (max-width: 720px) {
  .app {
    padding: 10px;
  }

  .topbar,
  .board-head,
  .top-actions {
    align-items: stretch;
    flex-direction: column;
  }

  .balance-card,
  .board-stats {
    width: 100%;
    min-width: 0;
  }

  .canvas-wrap {
    min-height: 460px;
  }

  .controls,
  .risk-card {
    grid-template-columns: 1fr;
  }

  .stats-grid {
    grid-template-columns: 1fr;
  }
}

@media (max-width: 460px) {
  .multiplier-cell {
    height: 24px;
    font-size: 0.52rem;
  }

  .canvas-wrap {
    min-height: 380px;
  }
}

</style>
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <div class="brand">
          <div class="brand-mark">G</div>
          <div>
            <h1>Gamba Plinko</h1>
            <p>Static GitHub Pages build</p>
          </div>
        </div>
        <div class="top-actions">
          <button id="soundBtn" class="icon-btn" type="button" title="Sound">Sound</button>
          <button id="statsBtn" class="icon-btn" type="button" title="Stats">Stats</button>
          <div class="balance-card">
            <span>Balance</span>
            <strong><span id="balance">10000.00</span> GAMBA</strong>
          </div>
        </div>
      </header>

      <section class="layout">
        <section class="board-panel">
          <div class="board-head">
            <div>
              <span class="label">Active risks</span>
              <div id="activeRisks" class="active-risks"></div>
            </div>
            <div class="board-stats">
              <div><span>Last</span><strong id="lastResult">Ready</strong></div>
              <div><span>Profit</span><strong id="profit">0.00 GAMBA</strong></div>
            </div>
          </div>

          <div class="canvas-wrap">
            <canvas id="boardCanvas"></canvas>
            <div id="multiplierGrid" class="multiplier-grid"></div>
          </div>
        </section>

        <aside class="recent-panel">
          <div class="panel-title">
            <h2>Recent rounds</h2>
            <span id="roundCount">0</span>
          </div>
          <div id="recentList" class="recent-list">
            <p class="muted">No rounds yet.</p>
          </div>
        </aside>
      </section>

      <section class="controls">
        <div class="control-card">
          <label for="betInput">Bet per circle</label>
          <div class="input-row">
            <button id="betMinus" type="button">-</button>
            <input id="betInput" type="number" min="1" step="1" value="10" />
            <button id="betPlus" type="button">+</button>
          </div>
          <div class="quick-row">
            <button id="halfBet" type="button">Half</button>
            <button id="doubleBet" type="button">Double</button>
            <button id="maxBet" type="button">Max</button>
          </div>
        </div>

        <div class="control-card">
          <label for="ballInput">Circles</label>
          <div class="input-row">
            <button id="ballMinus" type="button">-</button>
            <input id="ballInput" type="number" min="1" max="100" step="1" value="1" />
            <button id="ballPlus" type="button">+</button>
          </div>
          <p class="hint">Up to 100 per drop</p>
        </div>

        <div class="risk-card">
          <button class="risk-btn green active" data-risk="green" type="button">
            <span>Green</span>
            <small>Low risk</small>
          </button>
          <button class="risk-btn yellow" data-risk="yellow" type="button">
            <span>Yellow</span>
            <small>Medium risk</small>
          </button>
          <button class="risk-btn red" data-risk="red" type="button">
            <span>Red</span>
            <small>High risk</small>
          </button>
        </div>

        <div class="launch-card">
          <button id="dropBtn" class="drop-btn" type="button">Drop</button>
          <button id="resetBtn" class="secondary-btn" type="button">Reset demo</button>
        </div>
      </section>
    </main>

    <dialog id="statsDialog" class="stats-dialog">
      <div class="dialog-head">
        <h2>Statistics</h2>
        <button id="closeStats" type="button">Close</button>
      </div>
      <div id="statsGrid" class="stats-grid"></div>
    </dialog>

    <script>
"use strict";

const CONFIG = {
  rows: 14,
  maxBalls: 100,
  startingBalance: 10000,
  risks: {
    green: {
      label: "Green",
      color: "#22C55E",
      glow: "rgba(34,197,94,0.45)",
      multipliers: [16, 8, 4, 2, 1.5, 1, 0.6, 0.2, 0.6, 1, 1.5, 2, 4, 8, 16],
      chances: [1, 2, 3, 5, 8, 10, 10, 22, 10, 10, 8, 5, 3, 2, 1]
    },
    yellow: {
      label: "Yellow",
      color: "#F59E0B",
      glow: "rgba(245,158,11,0.45)",
      multipliers: [60, 15, 8, 4, 2, 1, 0.3, 0, 0.3, 1, 2, 4, 8, 15, 60],
      chances: [0.1, 0.2, 1, 2, 4, 8, 16, 37.4, 16, 8, 4, 2, 1, 0.2, 0.1]
    },
    red: {
      label: "Red",
      color: "#EF4444",
      glow: "rgba(239,68,68,0.48)",
      multipliers: [300, 80, 25, 10, 3, 1, 0.2, 0, 0.2, 1, 3, 10, 25, 80, 300],
      chances: [0.01, 0.02, 1, 2, 4, 8, 16, 37.94, 16, 8, 4, 2, 1, 0.02, 0.01]
    }
  },
  riskOrder: ["green", "yellow", "red"]
};

const canvas = document.getElementById("boardCanvas");
const ctx = canvas.getContext("2d");

const ui = {
  balance: document.getElementById("balance"),
  activeRisks: document.getElementById("activeRisks"),
  lastResult: document.getElementById("lastResult"),
  profit: document.getElementById("profit"),
  multiplierGrid: document.getElementById("multiplierGrid"),
  recentList: document.getElementById("recentList"),
  roundCount: document.getElementById("roundCount"),
  betInput: document.getElementById("betInput"),
  ballInput: document.getElementById("ballInput"),
  dropBtn: document.getElementById("dropBtn"),
  soundBtn: document.getElementById("soundBtn"),
  statsBtn: document.getElementById("statsBtn"),
  resetBtn: document.getElementById("resetBtn"),
  statsDialog: document.getElementById("statsDialog"),
  statsGrid: document.getElementById("statsGrid"),
  closeStats: document.getElementById("closeStats")
};

const state = {
  balance: CONFIG.startingBalance,
  wager: 10,
  ballCount: 1,
  activeRisks: ["green"],
  sound: true,
  balls: [],
  particles: [],
  pulses: [],
  recentRounds: [],
  pendingRounds: new Map(),
  hit: null,
  stats: {
    bets: 0,
    wins: 0,
    wagered: 0,
    paid: 0,
    biggestWin: 0,
    highestMultiplier: 0,
    byRisk: {
      green: emptyRiskStats(),
      yellow: emptyRiskStats(),
      red: emptyRiskStats()
    }
  },
  size: { width: 900, height: 620 },
  metrics: null,
  pegPositions: []
};

let audioContext = null;
let ballId = 1;
let roundId = 1;

function emptyRiskStats() {
  return {
    bets: 0,
    wins: 0,
    wagered: 0,
    paid: 0,
    biggestWin: 0,
    highestMultiplier: 0
  };
}

function clamp(value, min, max) {
  return Math.min(max, Math.max(min, value));
}

function formatMoney(value) {
  return Number(value).toLocaleString(undefined, {
    minimumFractionDigits: 2,
    maximumFractionDigits: 2
  });
}

function formatMultiplier(value) {
  return Number.isInteger(value) ? value + "x" : value.toFixed(2).replace(/0+$/, "").replace(/\.$/, "") + "x";
}

function riskConfig(risk) {
  return CONFIG.risks[risk];
}

function normalizeBallCount(value) {
  const riskCount = state.activeRisks.length || 1;
  let count = Math.round(clamp(Number(value) || 1, riskCount, CONFIG.maxBalls));

  if (riskCount > 1) {
    const nextMultiple = Math.ceil(count / riskCount) * riskCount;
    count = nextMultiple <= CONFIG.maxBalls ? nextMultiple : Math.floor(CONFIG.maxBalls / riskCount) * riskCount;
  }

  return clamp(count, 1, CONFIG.maxBalls);
}

function riskSequence(count) {
  const ordered = CONFIG.riskOrder.filter((risk) => state.activeRisks.includes(risk));
  return Array.from({ length: count }, (_, index) => ordered[index % ordered.length]);
}

function resizeCanvas() {
  const rect = canvas.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  canvas.width = Math.max(1, Math.floor(rect.width * dpr));
  canvas.height = Math.max(1, Math.floor(rect.height * dpr));
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  state.size = { width: rect.width, height: rect.height };
  calculateBoard();
  renderMultipliers();
}

function calculateBoard() {
  const width = state.size.width;
  const height = state.size.height;
  const boardWidth = clamp(Math.min(width * 0.86, 940), 360, Math.max(360, width - 44));
  const centerX = width / 2;
  const left = centerX - boardWidth / 2;
  const slotCount = CONFIG.rows + 1;
  const slotWidth = boardWidth / slotCount;
  const multiplierReserve = width < 520 ? 96 : 126;
  const slotBottom = height - multiplierReserve;
  const pocketHeight = width < 520 ? 32 : 44;
  const slotTop = slotBottom - pocketHeight;
  const rowGap = Math.min((slotTop - 54) / CONFIG.rows, (boardWidth / CONFIG.rows) * 0.82);
  const pegGap = slotWidth;
  const lastPegY = slotTop - rowGap * 0.36;
  const top = lastPegY - (CONFIG.rows - 1) * rowGap;
  const pegRadius = clamp(pegGap * 0.112, 4.0, 6.8);
  const ballRadius = clamp(pegGap * 0.24, 10, 14.5);

  const pegPositions = [];
  for (let row = 0; row < CONFIG.rows; row += 1) {
    const count = row + 2;
    const y = top + row * rowGap;
    const startX = centerX - ((count - 1) * pegGap) / 2;

    for (let index = 0; index < count; index += 1) {
      pegPositions.push({ id: "p-" + row + "-" + index, x: startX + index * pegGap, y, row });
    }
  }

  state.metrics = {
    left,
    centerX,
    boardWidth,
    top,
    lastPegY,
    pegGap,
    rowGap,
    pegRadius,
    ballRadius,
    slotCount,
    slotWidth,
    slotTop,
    slotBottom,
    pocketHeight
  };
  state.pegPositions = pegPositions;
}

function launchRound() {
  state.ballCount = normalizeBallCount(ui.ballInput.value);
  ui.ballInput.value = state.ballCount;

  let wager = Math.max(1, Math.floor(Number(ui.betInput.value) || state.wager));
  const totalRequested = wager * state.ballCount;

  if (totalRequested > state.balance) {
    wager = Math.floor(state.balance / state.ballCount);
    if (wager < 1) return;
    ui.betInput.value = wager;
  }

  state.wager = wager;
  const stake = wager * state.ballCount;
  state.balance -= stake;

  const id = "round-" + roundId;
  roundId += 1;

  const round = {
    id,
    stake,
    payout: 0,
    completed: 0,
    ballCount: state.ballCount,
    risks: [],
    bestMultiplier: 0,
    startedAt: Date.now()
  };
  state.pendingRounds.set(id, round);

  const risks = riskSequence(state.ballCount);
  const spawnGap = 48;

  risks.forEach((risk, index) => {
    window.setTimeout(() => spawnBall(id, risk, wager, index), index * spawnGap);
  });

  playTone(160, 0.055, 0.04);
  renderUi();
}

function spawnBall(round, risk, wager, index) {
  const m = state.metrics;
  const config = riskConfig(risk);
  const side = index % 2 === 0 ? -1 : 1;
  const startX = m.centerX + side * (m.pegGap * 0.07 + Math.random() * m.pegGap * 0.08);
  const startY = m.top - m.rowGap * 1.25;
  const vx = side * (0.12 + Math.random() * 0.16);
  const vy = 0.1 + Math.random() * 0.12;

  state.balls.push({
    id: ballId,
    round,
    risk,
    wager,
    color: config.color,
    x: startX,
    y: startY,
    vx,
    vy,
    trail: [],
    settled: false,
    hitCooldowns: Object.create(null),
    stuckFrames: 0,
    lastX: startX,
    lastY: startY
  });
  ballId += 1;
}

function settleBall(ball) {
  if (ball.settled) return;
  ball.settled = true;
  state.balance += ball.payout;
  state.hit = { risk: ball.risk, slot: ball.slot, until: performance.now() + 520 };

  const win = ball.payout > ball.wager;
  const riskStats = state.stats.byRisk[ball.risk];
  updateStats(state.stats, ball, win);
  updateStats(riskStats, ball, win);

  const round = state.pendingRounds.get(ball.round);
  if (round) {
    round.payout = Math.round((round.payout + ball.payout) * 100) / 100;
    round.completed += 1;
    round.bestMultiplier = Math.max(round.bestMultiplier, ball.multiplier);
    if (!round.risks.includes(ball.risk)) round.risks.push(ball.risk);

    if (round.completed >= round.ballCount) {
      state.pendingRounds.delete(round.id);
      round.profit = Math.round((round.payout - round.stake) * 100) / 100;
      state.recentRounds.unshift(round);
      state.recentRounds = state.recentRounds.slice(0, 8);
      ui.lastResult.textContent = formatMultiplier(round.bestMultiplier) + " / " + formatMoney(round.payout);
      ui.profit.textContent = (round.profit >= 0 ? "+" : "") + formatMoney(round.profit) + " GAMBA";
    }
  }

  playTone(ball.multiplier >= 10 ? 520 : 320, ball.multiplier >= 10 ? 0.18 : 0.08, 0.04);
  renderMultipliers();
  renderUi();
}

function updateStats(stats, ball, win) {
  stats.bets += 1;
  stats.wins += win ? 1 : 0;
  stats.wagered = Math.round((stats.wagered + ball.wager) * 100) / 100;
  stats.paid = Math.round((stats.paid + ball.payout) * 100) / 100;
  stats.biggestWin = Math.max(stats.biggestWin, ball.payout);
  stats.highestMultiplier = Math.max(stats.highestMultiplier, ball.multiplier);
}

function tick(now) {
  updateBalls(now);
  updateParticles(now);
  draw(now);
  requestAnimationFrame(tick);
}

function updateBalls(now) {
  const m = state.metrics;
  if (!m) return;

  const GRAVITY = 0.18;
  const RESTITUTION = 0.58;
  const WALL_RESTITUTION = 0.38;
  const AIR_DRAG = 0.997;
  const TANGENT_FRICTION = 0.985;
  const MAX_SPEED = 7.8;
  const SUBSTEPS = 4;
  const COLLISION_SLOP = 0.04;

  state.balls.forEach((ball) => {
    if (ball.settled) return;

    for (let step = 0; step < SUBSTEPS; step += 1) {
      ball.vy += GRAVITY / SUBSTEPS;
      ball.vx *= AIR_DRAG;
      ball.vy *= AIR_DRAG;

      const speed = Math.hypot(ball.vx, ball.vy);
      if (speed > MAX_SPEED) {
        const scale = MAX_SPEED / speed;
        ball.vx *= scale;
        ball.vy *= scale;
      }

      ball.x += ball.vx / SUBSTEPS;
      ball.y += ball.vy / SUBSTEPS;

      if (ball.x - m.ballRadius < m.left) {
        ball.x = m.left + m.ballRadius;
        if (ball.vx < 0) ball.vx = -ball.vx * WALL_RESTITUTION;
      } else if (ball.x + m.ballRadius > m.left + m.boardWidth) {
        ball.x = m.left + m.boardWidth - m.ballRadius;
        if (ball.vx > 0) ball.vx = -ball.vx * WALL_RESTITUTION;
      }

      for (let pass = 0; pass < 2; pass += 1) {
        for (let index = 0; index < state.pegPositions.length; index += 1) {
          const peg = state.pegPositions[index];

          if (Math.abs(peg.y - ball.y) > m.rowGap || Math.abs(peg.x - ball.x) > m.pegGap) {
            continue;
          }

          let dx = ball.x - peg.x;
          let dy = ball.y - peg.y;
          let distance = Math.hypot(dx, dy);
          const minDistance = m.ballRadius + m.pegRadius;

          if (distance >= minDistance) {
            continue;
          }

          if (distance < 0.0001) {
            dx = Math.random() < 0.5 ? -0.001 : 0.001;
            dy = -0.001;
            distance = Math.hypot(dx, dy);
          }

          const nx = dx / distance;
          const ny = dy / distance;
          const overlap = minDistance - distance + COLLISION_SLOP;

          ball.x += nx * overlap;
          ball.y += ny * overlap;

          const normalVelocity = ball.vx * nx + ball.vy * ny;

          if (normalVelocity < 0) {
            const tx = -ny;
            const ty = nx;
            const tangentVelocity = ball.vx * tx + ball.vy * ty;
            const nextNormalVelocity = -normalVelocity * RESTITUTION;
            const nextTangentVelocity = tangentVelocity * TANGENT_FRICTION;

            ball.vx = nx * nextNormalVelocity + tx * nextTangentVelocity;
            ball.vy = ny * nextNormalVelocity + ty * nextTangentVelocity;

            if (Math.abs(ball.vx) < 0.08) {
              ball.vx += (Math.random() < 0.5 ? -1 : 1) * 0.18;
            } else {
              ball.vx += (Math.random() - 0.5) * 0.045;
            }

            if (ny < -0.72 && Math.abs(nx) < 0.34) {
              ball.vx += (Math.random() < 0.5 ? -1 : 1) * (0.42 + Math.random() * 0.2);
            }
          }

          if (!ball.hitCooldowns[peg.id]) {
            ball.hitCooldowns[peg.id] = 8;
            addPegHit(peg.x, peg.y, ball.risk);
          }
        }
      }

      if (ball.y >= m.slotTop) break;
    }

    Object.keys(ball.hitCooldowns).forEach((id) => {
      ball.hitCooldowns[id] -= 1;
      if (ball.hitCooldowns[id] <= 0) delete ball.hitCooldowns[id];
    });

    ball.trail.push({ x: ball.x, y: ball.y });
    if (ball.trail.length > 8) ball.trail.shift();

    const frameMove = Math.hypot(ball.x - ball.lastX, ball.y - ball.lastY);
    const speedNow = Math.hypot(ball.vx, ball.vy);
    if (ball.y < m.slotTop - m.rowGap && frameMove < 0.045 && speedNow < 0.16) {
      ball.stuckFrames += 1;
    } else {
      ball.stuckFrames = 0;
    }

    if (ball.stuckFrames > 8) {
      ball.vx += (Math.random() < 0.5 ? -1 : 1) * 0.55;
      ball.vy += 0.45;
      ball.stuckFrames = 0;
    }

    ball.lastX = ball.x;
    ball.lastY = ball.y;

    if (ball.y + m.ballRadius >= m.slotTop) {
      const relX = ball.x - m.left;
      const slot = clamp(Math.floor(relX / m.slotWidth), 0, m.slotCount - 1);
      ball.slot = slot;
      ball.multiplier = riskConfig(ball.risk).multipliers[slot];
      ball.payout = Math.round(ball.wager * ball.multiplier * 100) / 100;
      settleBall(ball);
    }
  });

  state.balls = state.balls.filter((ball) => !ball.settled);
}

function addPegHit(x, y, risk) {
  const nearest = state.pegPositions.reduce((best, peg) => {
    if (!best) return peg;
    return Math.hypot(peg.x - x, peg.y - y) < Math.hypot(best.x - x, best.y - y) ? peg : best;
  }, null);

  if (!nearest) return;

  state.pulses.push({
    x: nearest.x,
    y: nearest.y,
    color: riskConfig(risk).color,
    life: 1
  });

  for (let index = 0; index < 4; index += 1) {
    const angle = Math.random() * Math.PI * 2;
    state.particles.push({
      x: nearest.x,
      y: nearest.y,
      vx: Math.cos(angle) * (0.5 + Math.random() * 0.9),
      vy: Math.sin(angle) * (0.5 + Math.random() * 0.9),
      color: riskConfig(risk).color,
      life: 1
    });
  }

  if (Math.random() < 0.2) playTone(220 + Math.random() * 160, 0.02, 0.012);
}

function updateParticles() {
  state.particles = state.particles
    .map((particle) => ({
      ...particle,
      x: particle.x + particle.vx,
      y: particle.y + particle.vy,
      vy: particle.vy + 0.035,
      life: particle.life - 0.035
    }))
    .filter((particle) => particle.life > 0);

  state.pulses = state.pulses
    .map((pulse) => ({ ...pulse, life: pulse.life - 0.05 }))
    .filter((pulse) => pulse.life > 0);
}

function draw(now) {
  const width = state.size.width;
  const height = state.size.height;
  const m = state.metrics;
  if (!m) return;

  const bg = ctx.createLinearGradient(0, 0, width, height);
  bg.addColorStop(0, "#080d13");
  bg.addColorStop(0.5, "#101926");
  bg.addColorStop(1, "#070b10");
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, width, height);

  const glow = ctx.createRadialGradient(width / 2, height * 0.28, 20, width / 2, height * 0.36, height * 0.58);
  glow.addColorStop(0, "rgba(6,182,212,0.18)");
  glow.addColorStop(0.6, "rgba(34,197,94,0.045)");
  glow.addColorStop(1, "rgba(6,182,212,0)");
  ctx.fillStyle = glow;
  ctx.fillRect(0, 0, width, height);

  drawBoardLines(m);
  drawPegs(m);
  drawParticles();
  drawBalls(now, m);
}

function drawBoardLines(m) {
  ctx.save();

  const pocketFill = ctx.createLinearGradient(0, m.slotTop, 0, m.slotBottom);
  pocketFill.addColorStop(0, "rgba(255,255,255,0.045)");
  pocketFill.addColorStop(1, "rgba(34,197,94,0.035)");
  ctx.fillStyle = pocketFill;
  ctx.fillRect(m.left, m.slotTop, m.boardWidth, m.slotBottom - m.slotTop);

  ctx.strokeStyle = "rgba(245,158,11,0.38)";
  ctx.lineWidth = 1.8;
  ctx.beginPath();
  ctx.moveTo(m.left, m.slotTop);
  ctx.lineTo(m.left + m.boardWidth, m.slotTop);
  ctx.stroke();

  ctx.strokeStyle = "rgba(148,163,184,0.42)";
  ctx.lineWidth = 1.4;
  for (let index = 0; index <= m.slotCount; index += 1) {
    const x = m.left + index * m.slotWidth;
    ctx.beginPath();
    ctx.moveTo(x, m.slotTop);
    ctx.lineTo(x, m.slotBottom);
    ctx.stroke();
  }

  ctx.strokeStyle = "rgba(148,163,184,0.22)";
  ctx.beginPath();
  ctx.moveTo(m.left, m.slotBottom);
  ctx.lineTo(m.left + m.boardWidth, m.slotBottom);
  ctx.stroke();

  ctx.restore();
}

function drawPegs(m) {
  state.pegPositions.forEach((peg) => {
    const pulse = state.pulses.find((item) => Math.hypot(item.x - peg.x, item.y - peg.y) < m.pegRadius * 2);
    const radius = m.pegRadius;

    const glow = ctx.createRadialGradient(peg.x, peg.y, 1, peg.x, peg.y, radius * (pulse ? 7 : 4.4));
    glow.addColorStop(0, pulse ? "rgba(255,255,255,0.52)" : "rgba(255,255,255,0.22)");
    glow.addColorStop(1, "rgba(255,255,255,0)");
    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(peg.x, peg.y, radius * (pulse ? 7 : 4.4), 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = "#f8fafc";
    ctx.beginPath();
    ctx.arc(peg.x, peg.y, radius, 0, Math.PI * 2);
    ctx.fill();

    ctx.strokeStyle = "rgba(100,116,139,0.72)";
    ctx.lineWidth = 1;
    ctx.stroke();
  });
}

function drawParticles() {
  state.particles.forEach((particle) => {
    ctx.globalAlpha = particle.life;
    ctx.fillStyle = particle.color;
    ctx.beginPath();
    ctx.arc(particle.x, particle.y, 2.2 * particle.life, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
}

function drawBalls(now, m) {
  state.balls.forEach((ball) => {
    if (ball.settled) return;
    const radius = m.ballRadius;

    ball.trail.forEach((point, index) => {
      const alpha = index / Math.max(1, ball.trail.length);
      ctx.globalAlpha = alpha * 0.18;
      ctx.fillStyle = ball.color;
      ctx.beginPath();
      ctx.arc(point.x, point.y, radius * alpha * 0.72, 0, Math.PI * 2);
      ctx.fill();
    });
    ctx.globalAlpha = 1;

    ctx.shadowColor = ball.color;
    ctx.shadowBlur = 16;
    ctx.fillStyle = ball.color;
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, radius, 0, Math.PI * 2);
    ctx.fill();

    ctx.shadowBlur = 0;
    ctx.strokeStyle = "rgba(255,255,255,0.88)";
    ctx.lineWidth = 1.8;
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, radius, 0, Math.PI * 2);
    ctx.stroke();
  });

  if (state.hit && now > state.hit.until) {
    state.hit = null;
    renderMultipliers();
  }
}

function renderMultipliers() {
  const m = state.metrics;
  if (!m) return;
  ui.multiplierGrid.style.left = m.left + "px";
  ui.multiplierGrid.style.width = m.boardWidth + "px";
  ui.multiplierGrid.innerHTML = "";

  CONFIG.riskOrder.forEach((risk) => {
    const config = riskConfig(risk);
    const row = document.createElement("div");
    row.className = "multiplier-row";

    config.multipliers.forEach((multiplier, index) => {
      const cell = document.createElement("div");
      const active = state.activeRisks.includes(risk);
      const hit = state.hit && state.hit.risk === risk && state.hit.slot === index;
      cell.className = "multiplier-cell" + (active ? "" : " dim") + (hit ? " hit" : "");
      cell.style.background = hit
        ? "linear-gradient(180deg, rgba(255,255,255,0.18), " + config.color + " 42%, rgba(11,15,20,0.84))"
        : "linear-gradient(180deg, " + config.color + ", rgba(11,15,20,0.72))";
      cell.style.color = "#ffffff";
      cell.style.borderColor = hit ? "rgba(255,255,255,0.9)" : config.color + "66";
      cell.style.boxShadow = hit ? "0 0 18px " + config.glow : "0 0 6px " + config.glow;
      cell.textContent = formatMultiplier(multiplier);
      row.appendChild(cell);
    });

    ui.multiplierGrid.appendChild(row);
  });
}

function renderUi() {
  ui.balance.textContent = formatMoney(state.balance);
  ui.betInput.value = state.wager;
  ui.ballInput.value = state.ballCount;
  ui.soundBtn.textContent = state.sound ? "Sound on" : "Sound off";
  ui.dropBtn.textContent = "Drop " + (state.ballCount > 1 ? state.ballCount : "");

  document.querySelectorAll(".risk-btn").forEach((button) => {
    button.classList.toggle("active", state.activeRisks.includes(button.dataset.risk));
  });

  ui.activeRisks.innerHTML = "";
  state.activeRisks.forEach((risk) => {
    const pill = document.createElement("span");
    pill.className = "risk-pill";
    pill.style.color = riskConfig(risk).color;
    pill.textContent = riskConfig(risk).label;
    ui.activeRisks.appendChild(pill);
  });

  renderRecent();
  renderMultipliers();
}

function renderRecent() {
  ui.roundCount.textContent = state.recentRounds.length;
  ui.recentList.innerHTML = "";

  if (!state.recentRounds.length) {
    const empty = document.createElement("p");
    empty.className = "muted";
    empty.textContent = "No rounds yet.";
    ui.recentList.appendChild(empty);
    return;
  }

  state.recentRounds.forEach((round) => {
    const item = document.createElement("div");
    item.className = "recent-item";
    const profitColor = round.profit >= 0 ? "var(--green)" : "var(--red)";
    const riskText = round.risks.map((risk) => riskConfig(risk).label).join(" / ");
    item.innerHTML =
      "<strong style=\"color:" + profitColor + "\"><span>" +
      (round.profit >= 0 ? "+" : "") + formatMoney(round.profit) +
      "</span><span>" + formatMoney(round.payout) + "</span></strong>" +
      "<p>" + round.ballCount + " circles - stake " + formatMoney(round.stake) + " - best " + formatMultiplier(round.bestMultiplier) + "</p>" +
      "<p>" + riskText + "</p>";
    ui.recentList.appendChild(item);
  });
}

function renderStats() {
  const rows = [
    ["Total bets", state.stats.bets],
    ["Total wins", state.stats.wins],
    ["Wagered", formatMoney(state.stats.wagered)],
    ["Paid", formatMoney(state.stats.paid)],
    ["Biggest win", formatMoney(state.stats.biggestWin)],
    ["Highest multiplier", formatMultiplier(state.stats.highestMultiplier || 0)]
  ];

  CONFIG.riskOrder.forEach((risk) => {
    const stats = state.stats.byRisk[risk];
    rows.push([riskConfig(risk).label + " paid", formatMoney(stats.paid)]);
  });

  ui.statsGrid.innerHTML = "";
  rows.forEach(([label, value]) => {
    const card = document.createElement("div");
    card.className = "stat-card";
    card.innerHTML = "<span>" + label + "</span><strong>" + value + "</strong>";
    ui.statsGrid.appendChild(card);
  });
}

function playTone(frequency, duration, volume) {
  if (!state.sound) return;
  try {
    audioContext = audioContext || new (window.AudioContext || window.webkitAudioContext)();
    const oscillator = audioContext.createOscillator();
    const gain = audioContext.createGain();
    oscillator.frequency.value = frequency;
    oscillator.type = "sine";
    gain.gain.value = volume;
    oscillator.connect(gain);
    gain.connect(audioContext.destination);
    oscillator.start();
    gain.gain.exponentialRampToValueAtTime(0.0001, audioContext.currentTime + duration);
    oscillator.stop(audioContext.currentTime + duration);
  } catch (_error) {
    state.sound = false;
  }
}

function resetDemo() {
  state.balance = CONFIG.startingBalance;
  state.wager = 10;
  state.ballCount = 1;
  state.activeRisks = ["green"];
  state.balls = [];
  state.particles = [];
  state.pulses = [];
  state.recentRounds = [];
  state.pendingRounds.clear();
  state.hit = null;
  state.stats = {
    bets: 0,
    wins: 0,
    wagered: 0,
    paid: 0,
    biggestWin: 0,
    highestMultiplier: 0,
    byRisk: {
      green: emptyRiskStats(),
      yellow: emptyRiskStats(),
      red: emptyRiskStats()
    }
  };
  ui.lastResult.textContent = "Ready";
  ui.profit.textContent = "0.00 GAMBA";
  renderUi();
}

function bindEvents() {
  document.querySelectorAll(".risk-btn").forEach((button) => {
    button.addEventListener("click", () => {
      const risk = button.dataset.risk;
      const active = state.activeRisks.includes(risk);

      if (active && state.activeRisks.length === 1) return;
      state.activeRisks = active
        ? state.activeRisks.filter((item) => item !== risk)
        : CONFIG.riskOrder.filter((item) => item === risk || state.activeRisks.includes(item));
      state.ballCount = normalizeBallCount(state.ballCount);
      renderUi();
    });
  });

  ui.dropBtn.addEventListener("click", launchRound);
  ui.soundBtn.addEventListener("click", () => {
    state.sound = !state.sound;
    renderUi();
  });
  ui.resetBtn.addEventListener("click", resetDemo);

  document.getElementById("betMinus").addEventListener("click", () => setWager(state.wager - 1));
  document.getElementById("betPlus").addEventListener("click", () => setWager(state.wager + 1));
  document.getElementById("halfBet").addEventListener("click", () => setWager(Math.max(1, Math.floor(state.wager / 2))));
  document.getElementById("doubleBet").addEventListener("click", () => setWager(Math.min(Math.floor(state.balance), state.wager * 2)));
  document.getElementById("maxBet").addEventListener("click", () => setWager(Math.max(1, Math.floor(state.balance / state.ballCount))));

  document.getElementById("ballMinus").addEventListener("click", () => setBallCount(state.ballCount - 1));
  document.getElementById("ballPlus").addEventListener("click", () => setBallCount(state.ballCount + 1));

  ui.betInput.addEventListener("change", () => setWager(ui.betInput.value));
  ui.ballInput.addEventListener("change", () => setBallCount(ui.ballInput.value));

  ui.statsBtn.addEventListener("click", () => {
    renderStats();
    ui.statsDialog.showModal();
  });
  ui.closeStats.addEventListener("click", () => ui.statsDialog.close());

  window.addEventListener("resize", resizeCanvas);
  window.addEventListener("keydown", (event) => {
    if (event.target instanceof HTMLInputElement) return;
    if (event.code === "Space") {
      event.preventDefault();
      launchRound();
    }
  });
}

function setWager(value) {
  state.wager = Math.max(1, Math.floor(Number(value) || 1));
  renderUi();
}

function setBallCount(value) {
  state.ballCount = normalizeBallCount(value);
  renderUi();
}

bindEvents();
resizeCanvas();
renderUi();
requestAnimationFrame(tick);

</script>
  </body>
</html>
