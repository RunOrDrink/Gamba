<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Gamba Side Rush</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="game-shell">
      <section class="control-panel" aria-label="Game controls">
        <div class="brand">
          <span class="brand-mark">G</span>
          <div>
            <h1>Gamba</h1>
            <p id="tokenTicker">GAMBA</p>
          </div>
        </div>

        <div class="wallet-card">
          <div class="wallet-row">
            <span>Wallet</span>
            <strong id="walletStatus">Not connected</strong>
          </div>
          <div class="wallet-row">
            <span>Network</span>
            <strong id="networkStatus">Devnet</strong>
          </div>
          <button class="connect-button" type="button" id="connectWalletButton">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M19 7h-1V6a3 3 0 0 0-3-3H5a3 3 0 0 0-3 3v12a3 3 0 0 0 3 3h14a3 3 0 0 0 3-3v-8a3 3 0 0 0-3-3zM5 5h10a1 1 0 0 1 1 1v1H5a1 1 0 0 1 0-2zm15 13a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V8.83c.31.11.65.17 1 .17h14a1 1 0 0 1 1 1v8zm-3-5.5a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0z"></path>
            </svg>
            <span>Connect wallet</span>
          </button>
        </div>

        <div class="field">
          <span class="field-label">Mode</span>
          <div class="segmented mode-toggle" role="group" aria-label="Wager mode">
            <button type="button" data-mode="demo" class="is-active">Demo</button>
            <button type="button" data-mode="live">Token</button>
          </div>
        </div>

        <div class="metric">
          <span id="balanceLabel">Demo balance</span>
          <strong id="balance">1000.00</strong>
        </div>

        <div class="field">
          <label for="wager">Wager <span id="wagerUnit">GAMBA</span></label>
          <div class="wager-row">
            <button class="small-button" type="button" id="halfButton">1/2</button>
            <input id="wager" type="number" inputmode="decimal" min="1" step="1" value="25">
            <button class="small-button" type="button" id="maxButton">Max</button>
          </div>
        </div>

        <div class="field">
          <label for="ballCount">Balls <span id="ballCountValue">1</span></label>
          <div class="wager-row">
            <button class="small-button" type="button" id="ballsMinusButton">-</button>
            <input id="ballCount" type="number" inputmode="numeric" min="1" max="10" step="1" value="1">
            <button class="small-button" type="button" id="ballsPlusButton">+</button>
          </div>
        </div>

        <div class="field">
          <span class="field-label">Side</span>
          <div class="segmented" role="group" aria-label="Launch side">
            <button type="button" data-side="left">Left</button>
            <button type="button" data-side="random" class="is-active">Random</button>
            <button type="button" data-side="right">Right</button>
          </div>
        </div>

        <div class="field">
          <span class="field-label">Risk</span>
          <div class="segmented" role="group" aria-label="Risk level">
            <button type="button" data-risk="low">Low</button>
            <button type="button" data-risk="medium" class="is-active">Medium</button>
            <button type="button" data-risk="high">High</button>
          </div>
        </div>

        <button class="play-button" type="button" id="playButton">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M8 5v14l11-7z"></path>
          </svg>
          <span>Launch</span>
        </button>

        <button class="reset-button" type="button" id="resetButton">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M20 6v5h-5"></path>
            <path d="M4.9 12a7 7 0 0 1 11.9-4.9L20 11"></path>
            <path d="M4 18v-5h5"></path>
            <path d="M19.1 12a7 7 0 0 1-11.9 4.9L4 13"></path>
          </svg>
          <span>Reset demo coins</span>
        </button>
      </section>

      <section class="arena" aria-label="Side rush board">
        <div class="arena-bar">
          <div class="round-readout" aria-live="polite">
            <span>Last</span>
            <strong id="lastResult">Ready</strong>
          </div>
          <div class="round-readout">
            <span>Profit</span>
            <strong id="profit">0.00</strong>
          </div>
          <div class="round-readout">
            <span>Mint</span>
            <strong id="mintStatus">Unset</strong>
          </div>
          <div class="round-readout">
            <span>Treasury</span>
            <strong id="treasuryStatus">Unset</strong>
          </div>
        </div>

        <div class="board-wrap">
          <canvas id="board" width="1200" height="675" aria-label="Animated multiplier board"></canvas>
        </div>

        <div class="multiplier-strip" id="multiplierStrip" aria-label="Multiplier pockets"></div>
      </section>

      <aside class="history-panel" aria-label="Round history">
        <div class="history-head">
          <h2>Rounds</h2>
          <span id="roundCount">0</span>
        </div>
        <ol class="history-list" id="historyList"></ol>
      </aside>
    </main>

    <script src="config.js"></script>
    <script src="app.js"></script>
  </body>
</html>
