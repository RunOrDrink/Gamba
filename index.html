<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Gamba Plinko</title>
    <link rel="stylesheet" href="styles.css?v=20260620-26">
  </head>
  <body>
    <main class="plinko-shell">
      <header class="top-bar" aria-label="Game header">
        <button class="game-select" type="button">
          <span>PLINKO</span>
          <span aria-hidden="true">⌄</span>
        </button>

        <button class="help-button" type="button">How to Play?</button>

        <div class="mode-pill" role="group" aria-label="Bet mode">
          <button type="button" data-mode="demo" class="is-active">Fun mode</button>
          <button type="button" data-mode="live">Token</button>
        </div>

        <div class="wallet-strip">
          <span id="walletStatus">Not connected</span>
          <button class="connect-button" type="button" id="connectWalletButton">Connect</button>
        </div>

        <div class="balance-strip">
          <span id="balanceLabel">Demo balance</span>
          <strong id="balance">1000.00</strong>
          <span id="tokenTicker">GAMBA</span>
        </div>
      </header>

      <section class="game-table" aria-label="Plinko game">
        <div class="table-top">
          <div class="pins-pill">Pins: <strong>14</strong></div>
          <div class="status-tape" aria-live="polite">
            <span>Last</span>
            <strong id="lastResult">Ready</strong>
          </div>
          <div class="status-tape">
            <span>Profit</span>
            <strong id="profit">0.00</strong>
          </div>
        </div>

        <div class="board-stage">
          <canvas id="board" width="960" height="540" aria-label="Animated Plinko board"></canvas>
          <div class="multiplier-grid" id="multiplierStrip" aria-label="Multiplier pockets"></div>
        </div>

        <section class="bet-panel" aria-label="Bet controls">
          <div class="bet-box">
            <label for="wager">Bet <span id="wagerUnit">GAMBA</span></label>
            <div class="bet-input-row">
              <input id="wager" type="number" inputmode="decimal" min="1" step="1" value="25">
              <button class="mini-button" type="button" id="halfButton">1/2</button>
              <button class="mini-button" type="button" id="maxButton">Max</button>
            </div>
          </div>

          <div class="drop-box">
            <label for="ballCount">Drops <span id="ballCountValue">1</span></label>
            <div class="drop-stepper">
              <button class="round-button" type="button" id="ballsMinusButton">−</button>
              <input id="ballCount" type="number" inputmode="numeric" min="1" max="100" step="1" value="1">
              <button class="round-button" type="button" id="ballsPlusButton">+</button>
            </div>
          </div>

          <button class="play-button" type="button" id="playButton">
            <span>Drop</span>
          </button>

          <div class="risk-buttons" role="group" aria-label="Risk level">
            <button type="button" data-risk="low">Green</button>
            <button type="button" data-risk="medium" class="is-active">Yellow</button>
            <button type="button" data-risk="high">Red</button>
          </div>

          <button class="reset-button" type="button" id="resetButton">Reset demo coins</button>
        </section>
      </section>

      <aside class="info-rail" aria-label="Round and token information">
        <div class="rail-card">
          <span>Rounds</span>
          <strong id="roundCount">0</strong>
        </div>
        <div class="rail-card">
          <span>Network</span>
          <strong id="networkStatus">Devnet</strong>
        </div>
        <div class="rail-card">
          <span>Mint</span>
          <strong id="mintStatus">Unset</strong>
        </div>
        <div class="rail-card">
          <span>Treasury</span>
          <strong id="treasuryStatus">Unset</strong>
        </div>
        <ol class="history-list" id="historyList"></ol>
      </aside>
    </main>

    <script src="https://unpkg.com/@solana/web3.js@1.98.0/lib/index.iife.min.js"></script>
    <script src="config.js?v=20260620-26"></script>
    <script src="app.js?v=20260620-26"></script>
  </body>
</html>
