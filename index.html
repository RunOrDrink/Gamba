<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Gamba Plinko - Refined Desktop Edition</title>
    <style>
:root {
  --bg: #0b0f14;
  --surface: #121821;
  --card: #171f2b;
  --border: #253041;
  --text: #ffffff;
  --muted: #94a3b8;
  --green: #22c55e;
  --emerald: #10b981;
  --yellow: #f59e0b;
  --red: #ef4444;
  --cyan: #06b6d4;
  --shadow: 0 24px 80px rgba(0, 0, 0, 0.6);
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  width: 100vw;
  height: 100vh;
  background:
    radial-gradient(circle at 50% -10%, rgba(6, 182, 212, 0.15), transparent 50%),
    var(--bg);
  color: var(--text);
  font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  overflow: hidden;
}

button, input {
  font: inherit;
  border: 0;
  outline: none;
}

button {
  cursor: pointer;
}

button:disabled {
  cursor: not-allowed;
  opacity: 0.55;
}

.app {
  display: flex;
  flex-direction: column;
  width: 100%;
  height: 100%;
  padding: 24px;
  gap: 20px;
}

.topbar, .board-panel, .recent-panel, .controls, .control-card, .risk-card, .launch-card, .stats-dialog {
  border: 1px solid var(--border);
  background: linear-gradient(180deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0.01)), rgba(18, 24, 33, 0.85);
  box-shadow: var(--shadow);
  backdrop-filter: blur(20px);
  border-radius: 16px;
}

/* TOPBAR */
.topbar {
  display: flex;
  height: 76px;
  align-items: center;
  justify-content: space-between;
  padding: 0 24px;
  flex-shrink: 0;
}

.brand {
  display: flex;
  align-items: center;
  gap: 14px;
}

.brand-mark {
  display: grid;
  width: 46px;
  height: 46px;
  place-items: center;
  border-radius: 12px;
  background: linear-gradient(135deg, var(--emerald), var(--cyan));
  color: #04110a;
  font-weight: 900;
  font-size: 1.5rem;
  box-shadow: 0 0 24px rgba(16, 185, 129, 0.35);
}

.brand h1 {
  font-size: 1.25rem;
  font-weight: 800;
  letter-spacing: -0.02em;
}

.brand p {
  color: var(--muted);
  font-size: 0.7rem;
  font-weight: 700;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  margin-top: 1px;
}

.top-actions {
  display: flex;
  align-items: center;
  gap: 14px;
}

.icon-btn, .secondary-btn, .input-row button, .quick-row button, .dialog-head button {
  height: 44px;
  padding: 0 18px;
  border: 1px solid var(--border);
  border-radius: 10px;
  background: rgba(255, 255, 255, 0.05);
  color: var(--text);
  font-weight: 700;
  transition: all 150ms ease;
}

.icon-btn:hover, .secondary-btn:hover, .input-row button:hover, .quick-row button:hover {
  border-color: var(--cyan);
  background: rgba(255, 255, 255, 0.1);
  transform: translateY(-1px);
}

.balance-card {
  width: 200px;
  height: 48px;
  border: 1px solid var(--border);
  border-radius: 10px;
  background: rgba(0, 0, 0, 0.25);
  padding: 5px 14px;
  text-align: right;
}

.balance-card span, .board-stats span, .control-card label, .panel-title h2 {
  display: block;
  color: var(--muted);
  font-size: 0.65rem;
  font-weight: 800;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}

.balance-card strong, .board-stats strong {
  display: block;
  font-size: 1.05rem;
  font-weight: 700;
}

/* MAIN LAYOUT */
.layout {
  display: flex;
  flex: 1;
  min-height: 0;
  gap: 20px;
}

.board-panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  position: relative;
  min-width: 0;
}

.board-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 24px;
  height: 72px;
  flex-shrink: 0;
}

.active-risks {
  display: flex;
  gap: 8px;
  margin-top: 4px;
}

.risk-pill {
  border: 1px solid currentColor;
  border-radius: 20px;
  padding: 2px 12px;
  font-size: 0.7rem;
  font-weight: 800;
  text-transform: uppercase;
}

.board-stats {
  display: flex;
  gap: 12px;
}

.board-stats div {
  width: 160px;
  border: 1px solid var(--border);
  border-radius: 10px;
  background: rgba(0, 0, 0, 0.2);
  padding: 6px 14px;
  text-align: right;
}

.canvas-wrap {
  position: relative;
  width: 100%;
  flex: 1;
  min-height: 0;
}

#boardCanvas {
  display: block;
  width: 100%;
  height: 100%;
}

.multiplier-grid {
  position: absolute;
  left: 0;
  bottom: 20px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  pointer-events: none;
}

.multiplier-row {
  display: flex;
  justify-content: center;
  gap: 4px;
  width: 100%;
}

.multiplier-cell {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 32px;
  border-radius: 6px;
  color: #fff;
  font-size: 0.75rem;
  font-weight: 800;
  transition: all 120ms ease;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.15), 0 4px 6px rgba(0,0,0,0.2);
}

.multiplier-cell.hit {
  transform: scale(1.08) translateY(-4px);
  box-shadow: 0 0 20px currentColor, 0 10px 15px rgba(0,0,0,0.4);
  font-weight: 900;
}

/* SIDE ROUNDS PANEL */
.recent-panel {
  width: 320px;
  height: 100%;
  display: flex;
  flex-direction: column;
  padding: 20px;
  flex-shrink: 0;
}

.panel-title {
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
  padding-bottom: 14px;
  flex-shrink: 0;
}

.panel-title span {
  border-radius: 20px;
  background: rgba(34, 197, 94, 0.15);
  color: var(--green);
  padding: 3px 10px;
  font-weight: 800;
  font-size: 0.8rem;
}

.recent-list {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 10px;
  overflow-y: auto;
  padding-top: 14px;
}

.recent-item {
  border: 1px solid var(--border);
  border-radius: 12px;
  background: rgba(255, 255, 255, 0.02);
  padding: 10px 14px;
}

.recent-item strong {
  display: flex;
  justify-content: space-between;
  font-size: 0.9rem;
}

.recent-item p {
  margin-top: 4px;
  color: var(--muted);
  font-size: 0.72rem;
  text-transform: uppercase;
}

/* FOOTER CONTROLS */
.controls {
  display: flex;
  width: 100%;
  height: 140px;
  padding: 16px;
  gap: 16px;
  flex-shrink: 0;
}

.control-card {
  flex: 1;
  padding: 14px;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.input-row {
  display: flex;
  gap: 6px;
  margin-top: 6px;
}

.input-row input {
  flex: 1;
  height: 44px;
  border: 1px solid var(--border);
  border-radius: 10px;
  background: #06090e;
  color: var(--text);
  font-weight: 700;
  text-align: center;
  font-size: 1rem;
}

.quick-row {
  display: flex;
  gap: 6px;
  margin-top: 6px;
}

.quick-row button {
  flex: 1;
  height: 30px;
  font-size: 0.75rem;
  padding: 0;
}

.risk-card {
  flex: 1.4;
  display: flex;
  gap: 12px;
  padding: 14px;
}

.risk-btn {
  flex: 1;
  border: 1px solid var(--border);
  border-radius: 12px;
  background: rgba(255, 255, 255, 0.02);
  color: var(--text);
  opacity: 0.35;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  transition: all 150ms ease;
}

.risk-btn span {
  font-weight: 800;
  text-transform: uppercase;
  font-size: 0.95rem;
  letter-spacing: 0.02em;
}

.risk-btn small {
  font-size: 0.68rem;
  color: var(--muted);
  margin-top: 2px;
}

.risk-btn.active {
  opacity: 1;
  transform: translateY(-2px);
}

.risk-btn.green.active {
  border-color: var(--green);
  background: linear-gradient(180deg, rgba(34,197,94,0.15), transparent);
  box-shadow: 0 4px 20px rgba(34,197,94,0.15);
}
.risk-btn.yellow.active {
  border-color: var(--yellow);
  background: linear-gradient(180deg, rgba(245,158,11,0.15), transparent);
  box-shadow: 0 4px 20px rgba(245,158,11,0.15);
}
.risk-btn.red.active {
  border-color: var(--red);
  background: linear-gradient(180deg, rgba(239,68,68,0.15), transparent);
  box-shadow: 0 4px 20px rgba(239,68,68,0.15);
}

.launch-card {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 8px;
  padding: 14px;
  justify-content: center;
}

.drop-btn {
  height: 58px;
  border-radius: 10px;
  background: linear-gradient(135deg, var(--green), var(--cyan));
  color: #04110a;
  font-weight: 900;
  font-size: 1.15rem;
  text-transform: uppercase;
  box-shadow: 0 4px 20px rgba(34, 197, 94, 0.4);
  transition: all 150ms ease;
}

.drop-btn:hover {
  filter: brightness(1.15);
  transform: translateY(-1px);
}

.secondary-btn {
  height: 36px;
}

/* STATS MODAL */
.stats-dialog {
  width: 600px;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  padding: 24px;
  color: var(--text);
}

.stats-dialog::backdrop {
  background: rgba(0, 0, 0, 0.75);
  backdrop-filter: blur(4px);
}

.dialog-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
}

.stats-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 14px;
}

.stat-card {
  border: 1px solid var(--border);
  border-radius: 10px;
  background: rgba(255, 255, 255, 0.02);
  padding: 12px 16px;
}

.stat-card span {
  font-size: 0.65rem;
  color: var(--muted);
  text-transform: uppercase;
}

.stat-card strong {
  display: block;
  font-size: 1.2rem;
  margin-top: 2px;
}
</style>
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <div class="brand">
          <div class="brand-mark">G</div>
          <div>
            <h1>Gamba Plinko</h1>
            <p>Adaptive Desktop Environment</p>
          </div>
        </div>
        <div class="top-actions">
          <button id="soundBtn" class="icon-btn" type="button">Sound</button>
          <button id="statsBtn" class="icon-btn" type="button">Stats</button>
          <div class="balance-card">
            <span>Balance</span>
            <strong><span id="balance">10000.00</span> GAMBA</strong>
          </div>
        </div>
      </header>

      <section class="layout">
        <section class="board-panel">
          <div class="board-head">
            <div>
              <span>Active risks</span>
              <div id="activeRisks" class="active-risks"></div>
            </div>
            <div class="board-stats">
              <div><span>Last</span><strong id="lastResult">Ready</strong></div>
              <div><span>Profit</span><strong id="profit">0.00 GAMBA</strong></div>
            </div>
          </div>

          <div class="canvas-wrap">
            <canvas id="boardCanvas"></canvas>
            <div id="multiplierGrid" class="multiplier-grid"></div>
          </div>
        </section>

        <aside class="recent-panel">
          <div class="panel-title">
            <h2>Recent rounds</h2>
            <span id="roundCount">0</span>
          </div>
          <div id="recentList" class="recent-list">
            <p class="muted">No rounds yet.</p>
          </div>
        </aside>
      </section>

      <section class="controls">
        <div class="control-card">
          <label>Bet per circle</label>
          <div class="input-row">
            <button id="betMinus" type="button">-</button>
            <input id="betInput" type="number" value="10" />
            <button id="betPlus" type="button">+</button>
          </div>
          <div class="quick-row">
            <button id="halfBet" type="button">Half</button>
            <button id="doubleBet" type="button">Double</button>
            <button id="maxBet" type="button">Max</button>
          </div>
        </div>

        <div class="control-card">
          <label>Circles</label>
          <div class="input-row">
            <button id="ballMinus" type="button">-</button>
            <input id="ballInput" type="number" value="1" />
            <button id="ballPlus" type="button">+</button>
          </div>
        </div>

        <div class="risk-card">
          <button class="risk-btn green active" data-risk="green" type="button">
            <span>Green</span>
            <small>Low risk</small>
          </button>
          <button class="risk-btn yellow" data-risk="yellow" type="button">
            <span>Yellow</span>
            <small>Medium risk</small>
          </button>
          <button class="risk-btn red" data-risk="red" type="button">
            <span>Red</span>
            <small>High risk</small>
          </button>
        </div>

        <div class="launch-card">
          <button id="dropBtn" class="drop-btn" type="button">Drop</button>
          <button id="resetBtn" class="secondary-btn" type="button">Reset demo</button>
        </div>
      </section>
    </main>

    <dialog id="statsDialog" class="stats-dialog">
      <div class="dialog-head">
        <h2>Statistics</h2>
        <button id="closeStats" type="button">Close</button>
      </div>
      <div id="statsGrid" class="stats-grid"></div>
    </dialog>

    <script>
"use strict";

const CONFIG = {
  rows: 14,
  maxBalls: 100,
  startingBalance: 10000,
  risks: {
    green: {
      label: "Green", color: "#22C55E",
      multipliers: [12, 5, 3, 1.4, 1.1, 0.5, 0.3, 0.2, 0.3, 0.5, 1.1, 1.4, 3, 5, 12]
    },
    yellow: {
      label: "Yellow", color: "#F59E0B",
      multipliers: [35, 11, 6, 3, 1.2, 0.7, 0.2, 0, 0.2, 0.7, 1.2, 3, 6, 11, 35]
    },
    red: {
      label: "Red", color: "#EF4444",
      multipliers: [150, 45, 18, 7, 2, 0.5, 0.1, 0, 0.1, 0.5, 2, 7, 18, 45, 150]
    }
  },
  riskOrder: ["green", "yellow", "red"]
};

const canvas = document.getElementById("boardCanvas");
const ctx = canvas.getContext("2d");

const ui = {
  balance: document.getElementById("balance"),
  activeRisks: document.getElementById("activeRisks"),
  lastResult: document.getElementById("lastResult"),
  profit: document.getElementById("profit"),
  multiplierGrid: document.getElementById("multiplierGrid"),
  recentList: document.getElementById("recentList"),
  roundCount: document.getElementById("roundCount"),
  betInput: document.getElementById("betInput"),
  ballInput: document.getElementById("ballInput"),
  dropBtn: document.getElementById("dropBtn"),
  soundBtn: document.getElementById("soundBtn"),
  statsBtn: document.getElementById("statsBtn"),
  resetBtn: document.getElementById("resetBtn"),
  statsDialog: document.getElementById("statsDialog"),
  statsGrid: document.getElementById("statsGrid"),
  closeStats: document.getElementById("closeStats")
};

const state = {
  balance: CONFIG.startingBalance,
  wager: 10,
  ballCount: 1,
  activeRisks: ["green"],
  sound: true,
  balls: [],
  pulses: [],
  recentRounds: [],
  pendingRounds: new Map(),
  hit: null,
  stats: { bets: 0, wins: 0, wagered: 0, paid: 0, biggestWin: 0, highestMultiplier: 0, byRisk: { green: emptyRiskStats(), yellow: emptyRiskStats(), red: emptyRiskStats() } },
  metrics: null,
  pegPositions: []
};

let audioContext = null;
let ballId = 1;
let roundId = 1;

function emptyRiskStats() {
  return { bets: 0, wins: 0, wagered: 0, paid: 0, biggestWin: 0, highestMultiplier: 0 };
}

function formatMoney(v) { return Number(v).toFixed(2); }
function formatMultiplier(v) { return v + "x"; }
function riskConfig(r) { return CONFIG.risks[r]; }

function initCanvasSize() {
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width;
  canvas.height = rect.height;
  calculateBoard(rect.width, rect.height);
  renderMultipliers();
}

function calculateBoard(w, h) {
  const centerX = w / 2;
  const slotCount = CONFIG.rows + 1;
  
  // Calculate dynamic constraints based on available canvas height
  const bottomOffset = 65; 
  const slotBottom = h - bottomOffset;
  const slotTop = slotBottom - 30;
  const topOffset = 40;
  
  // Geometry Lock: Define peg rows matching row count flawlessly
  const rowGap = (slotTop - topOffset) / CONFIG.rows;
  const pegGap = rowGap * 1.12; 
  
  const boardWidth = pegGap * (slotCount - 1);
  const left = centerX - boardWidth / 2;
  const slotWidth = boardWidth / slotCount;

  const pegPositions = [];
  for (let row = 0; row < CONFIG.rows; row++) {
    const count = row + 1; // Triangle pattern rows increment cleanly
    const y = topOffset + row * rowGap;
    const startX = centerX - ((count - 1) * pegGap) / 2;
    for (let i = 0; i < count; i++) {
      pegPositions.push({ id: `p-${row}-${i}`, x: startX + i * pegGap, y, row });
    }
  }

  state.metrics = {
    left, centerX, boardWidth, topOffset, pegGap, rowGap,
    pegRadius: 4, ballRadius: 7, slotCount, slotWidth, slotTop, slotBottom
  };
  state.pegPositions = pegPositions;
}

function launchRound() {
  let count = Math.min(CONFIG.maxBalls, Math.max(1, parseInt(ui.ballInput.value) || 1));
  let wager = Math.max(1, parseInt(ui.betInput.value) || 1);
  
  if (wager * count > state.balance) {
    count = Math.floor(state.balance / wager);
    if (count < 1) {
      wager = Math.floor(state.balance);
      count = 1;
    }
    if (wager < 1) return;
  }

  state.wager = wager;
  state.ballCount = count;
  state.balance -= wager * count;

  const rId = "r-" + roundId++;
  const round = { id: rId, stake: wager * count, payout: 0, completed: 0, ballCount: count, risks: [], bestMultiplier: 0 };
  state.pendingRounds.set(rId, round);

  const activeOrdered = CONFIG.riskOrder.filter(r => state.activeRisks.includes(r));
  
  for (let i = 0; i < count; i++) {
    const risk = activeOrdered[i % activeOrdered.length];
    setTimeout(() => spawnBall(rId, risk, wager), i * 70);
  }

  playTone(220, 0.04, 0.05);
  renderUi();
}

function spawnBall(round, risk, wager) {
  const m = state.metrics;
  // Natural micro variance at top drop point drop-zone
  const startX = m.centerX + (Math.random() - 0.5) * 4;
  const startY = m.topOffset - 20;

  state.balls.push({
    id: ballId++, round, risk, wager, color: riskConfig(risk).color,
    x: startX, y: startY, vx: (Math.random() - 0.5) * 0.4, vy: 1.0,
    settled: false, lastPegId: null
  });
}

function settleBall(ball) {
  ball.settled = true;
  state.balance += ball.payout;
  state.hit = { risk: ball.risk, slot: ball.slot, until: performance.now() + 350 };

  const win = ball.payout > ball.wager;
  const stats = state.stats;
  const rStats = state.stats.byRisk[ball.risk];

  [stats, rStats].forEach(s => {
    s.bets++;
    if (win) s.wins++;
    s.wagered += ball.wager;
    s.paid += ball.payout;
    s.biggestWin = Math.max(s.biggestWin, ball.payout);
    s.highestMultiplier = Math.max(s.highestMultiplier, ball.multiplier);
  });

  const round = state.pendingRounds.get(ball.round);
  if (round) {
    round.payout += ball.payout;
    round.completed++;
    round.bestMultiplier = Math.max(round.bestMultiplier, ball.multiplier);
    if (!round.risks.includes(ball.risk)) round.risks.push(ball.risk);

    if (round.completed >= round.ballCount) {
      state.pendingRounds.delete(round.id);
      round.profit = round.payout - round.stake;
      state.recentRounds.unshift(round);
      state.recentRounds = state.recentRounds.slice(0, 12);
      
      ui.lastResult.textContent = formatMultiplier(round.bestMultiplier) + " / " + formatMoney(round.payout);
      ui.profit.textContent = (round.profit >= 0 ? "+" : "") + formatMoney(round.profit);
      ui.profit.style.color = round.profit >= 0 ? "var(--green)" : "var(--red)";
    }
  }

  playTone(ball.multiplier >= 3 ? 480 : 320, 0.08, 0.05);
  renderMultipliers();
  renderUi();
}

function tick() {
  updatePhysics();
  draw();
  requestAnimationFrame(tick);
}

function updatePhysics() {
  const m = state.metrics;
  if (!m) return;

  const GRAVITY = 0.22;
  const TERMINAL_VELOCITY = 6.5;

  state.balls.forEach(ball => {
    if (ball.settled) return;

    ball.vy = Math.min(TERMINAL_VELOCITY, ball.vy + GRAVITY);
    ball.x += ball.vx;
    ball.y += ball.vy;

    // Fluid container wall safety dampening
    if (ball.x - m.ballRadius < m.left) {
      ball.x = m.left + m.ballRadius;
      ball.vx = Math.abs(ball.vx) * 0.4;
    } else if (ball.x + m.ballRadius > m.left + m.boardWidth) {
      ball.x = m.left + m.boardWidth - m.ballRadius;
      ball.vx = -Math.abs(ball.vx) * 0.4;
    }

    // Dynamic Peg Iteration matrix
    for (let i = 0; i < state.pegPositions.length; i++) {
      const peg = state.pegPositions[i];
      const dx = ball.x - peg.x;
      const dy = ball.y - peg.y;
      const dist = Math.hypot(dx, dy);
      const minDist = m.ballRadius + m.pegRadius;

      if (dist < minDist) {
        // Enforce physical separation geometry boundaries immediately
        const overlap = minDist - dist;
        const nx = dx === 0 ? (Math.random() - 0.5) * 0.1 : dx / dist;
        const ny = dy / dist;

        ball.x += nx * overlap;
        ball.y += ny * overlap;

        if (ball.lastPegId !== peg.id) {
          ball.lastPegId = peg.id;

          // Pure Galton split deflection metrics
          const side = nx > 0 ? 1 : -1;
          ball.vx = side * (1.2 + Math.random() * 0.6);
          ball.vy = rowGap * 0.14;

          state.pulses.push({ x: peg.x, y: peg.y, color: ball.color, life: 1.0 });
          if (Math.random() < 0.2) playTone(350 + (peg.row * 15), 0.02, 0.015);
        }
        break;
      }
    }

    // Capture point processing trigger line
    if (ball.y >= m.slotTop) {
      const relX = ball.x - m.left;
      let slot = Math.floor(relX / m.slotWidth);
      slot = Math.max(0, Math.min(m.slotCount - 1, slot));
      
      ball.slot = slot;
      ball.multiplier = riskConfig(ball.risk).multipliers[slot];
      ball.payout = ball.wager * ball.multiplier;
      settleBall(ball);
    }
  });

  state.balls = state.balls.filter(b => !b.settled);
  state.pulses = state.pulses.map(p => ({ ...p, life: p.life - 0.1 })).filter(p => p.life > 0);
}

function draw() {
  const w = canvas.width;
  const h = canvas.height;
  const m = state.metrics;
  if (!m) return;

  ctx.fillStyle = "#0c111a";
  ctx.fillRect(0, 0, w, h);

  // Structural Grid Pin Mapping
  state.pegPositions.forEach(peg => {
    const pulse = state.pulses.find(p => Math.hypot(p.x - peg.x, p.y - peg.y) < 12);
    if (pulse) {
      ctx.fillStyle = pulse.color;
      ctx.globalAlpha = pulse.life * 0.35;
      ctx.beginPath();
      ctx.arc(peg.x, peg.y, m.pegRadius * 4, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1.0;
    }

    ctx.fillStyle = "rgba(255,255,255,0.85)";
    ctx.beginPath();
    ctx.arc(peg.x, peg.y, m.pegRadius, 0, Math.PI * 2);
    ctx.fill();
  });

  // Dynamic Sphere Assets Render Pipeline
  state.balls.forEach(ball => {
    ctx.fillStyle = ball.color;
    ctx.shadowColor = ball.color;
    ctx.shadowBlur = 10;
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, m.ballRadius, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;

    ctx.strokeStyle = "#ffffff";
    ctx.lineWidth = 1.5;
    ctx.stroke();
  });
}

function renderMultipliers() {
  const m = state.metrics;
  if (!m) return;
  
  ui.multiplierGrid.style.left = m.left + "px";
  ui.multiplierGrid.style.width = m.boardWidth + "px";
  ui.multiplierGrid.innerHTML = "";

  CONFIG.riskOrder.forEach(risk => {
    if (!state.activeRisks.includes(risk)) return;
    const config = riskConfig(risk);
    const row = document.createElement("div");
    row.className = "multiplier-row";

    config.multipliers.forEach((mult, idx) => {
      const cell = document.createElement("div");
      const isHit = state.hit && state.hit.risk === risk && state.hit.slot === idx;
      cell.className = "multiplier-cell" + (isHit ? " hit" : "");
      cell.style.width = `${m.slotWidth - 4}px`;
      cell.style.backgroundColor = config.color;
      if (isHit) cell.style.color = "#000000";
      cell.textContent = mult + "x";
      row.appendChild(cell);
    });
    ui.multiplierGrid.appendChild(row);
  });
}

function renderUi() {
  ui.balance.textContent = formatMoney(state.balance);
  ui.betInput.value = state.wager;
  ui.ballInput.value = state.ballCount;
  ui.dropBtn.textContent = "Drop " + (state.ballCount > 1 ? state.ballCount : "");

  document.querySelectorAll(".risk-btn").forEach(btn => {
    btn.classList.toggle("active", state.activeRisks.includes(btn.dataset.risk));
  });

  ui.activeRisks.innerHTML = "";
  state.activeRisks.forEach(risk => {
    const pill = document.createElement("span");
    pill.className = "risk-pill";
    pill.style.color = riskConfig(risk).color;
    pill.textContent = riskConfig(risk).label;
    ui.activeRisks.appendChild(pill);
  });

  ui.roundCount.textContent = state.recentRounds.length;
  ui.recentList.innerHTML = "";
  if (state.recentRounds.length === 0) {
    ui.recentList.innerHTML = '<p class="muted" style="text-align:center; padding-top:20px;">No rounds yet.</p>';
  } else {
    state.recentRounds.forEach(r => {
      const div = document.createElement("div");
      div.className = "recent-item";
      const color = r.profit >= 0 ? "var(--green)" : "var(--red)";
      div.innerHTML = `
        <strong style="color:${color}"><span>${r.profit >= 0 ? "+" : ""}${formatMoney(r.profit)}</span><span>${formatMoney(r.payout)}</span></strong>
        <p>${r.ballCount} circles • stake ${formatMoney(r.stake)} • best ${r.bestMultiplier}x</p>
      `;
      ui.recentList.appendChild(div);
    });
  }
}

function renderStats() {
  const rows = [
    ["Total Bets", state.stats.bets],
    ["Total Wins", state.stats.wins],
    ["Wagered", formatMoney(state.stats.wagered)],
    ["Paid out", formatMoney(state.stats.paid)],
    ["Max Payout", formatMoney(state.stats.biggestWin)],
    ["Top Multiplier", formatMultiplier(state.stats.highestMultiplier)]
  ];
  ui.statsGrid.innerHTML = "";
  rows.forEach(([label, val]) => {
    const card = document.createElement("div");
    card.className = "stat-card";
    card.innerHTML = `<span>${label}</span><strong>${val}</strong>`;
    ui.statsGrid.appendChild(card);
  });
}

function playTone(freq, dur, vol) {
  if (!state.sound) return;
  try {
    audioContext = audioContext || new (window.AudioContext || window.webkitAudioContext)();
    const osc = audioContext.createOscillator();
    const gain = audioContext.createGain();
    osc.frequency.value = freq;
    osc.type = "sine";
    gain.gain.setValueAtTime(vol, audioContext.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + dur);
    osc.connect(gain);
    gain.connect(audioContext.destination);
    osc.start();
    osc.stop(audioContext.currentTime + dur);
  } catch(e) { state.sound = false; }
}

function bindEvents() {
  ui.dropBtn.addEventListener("click", launchRound);
  ui.soundBtn.addEventListener("click", () => { state.sound = !state.sound; ui.soundBtn.textContent = state.sound ? "Sound" : "Muted"; });
  ui.resetBtn.addEventListener("click", () => {
    state.balance = CONFIG.startingBalance;
    state.recentRounds = [];
    state.stats = { bets: 0, wins: 0, wagered: 0, paid: 0, biggestWin: 0, highestMultiplier: 0, byRisk: { green: emptyRiskStats(), yellow: emptyRiskStats(), red: emptyRiskStats() } };
    ui.lastResult.textContent = "Ready";
    ui.profit.textContent = "0.00 GAMBA";
    renderUi();
  });

  document.querySelectorAll(".risk-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      const r = btn.dataset.risk;
      if (state.activeRisks.includes(r) && state.activeRisks.length === 1) return;
      state.activeRisks = state.activeRisks.includes(r) ? state.activeRisks.filter(x => x !== r) : [...state.activeRisks, r];
      renderMultipliers();
      renderUi();
    });
  });

  document.getElementById("betMinus").addEventListener("click", () => { state.wager = Math.max(1, state.wager - 10); renderUi(); });
  document.getElementById("betPlus").addEventListener("click", () => { state.wager += 10; renderUi(); });
  document.getElementById("halfBet").addEventListener("click", () => { state.wager = Math.max(1, Math.floor(state.wager / 2)); renderUi(); });
  document.getElementById("doubleBet").addEventListener("click", () => { state.wager *= 2; renderUi(); });
  document.getElementById("maxBet").addEventListener("click", () => { state.wager = Math.floor(state.balance); renderUi(); });

  document.getElementById("ballMinus").addEventListener("click", () => { ui.ballInput.value = Math.max(1, (parseInt(ui.ballInput.value) || 1) - 1); renderUi(); });
  document.getElementById("ballPlus").addEventListener("click", () => { ui.ballInput.value = Math.min(CONFIG.maxBalls, (parseInt(ui.ballInput.value) || 1) + 1); renderUi(); });

  ui.statsBtn.addEventListener("click", () => { renderStats(); ui.statsDialog.showModal(); });
  ui.closeStats.addEventListener("click", () => ui.statsDialog.close());
  
  window.addEventListener("resize", initCanvasSize);
}

bindEvents();
initCanvasSize();
renderUi();
requestAnimationFrame(tick);
    </script>
  </body>
</html>
